<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexto - File d'attente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="waiting.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">Nexto</div>
            <nav>
                <a href="index.html">Accueil</a>
                <a href="waiting.html">File d'Attente</a>
                <a href="display.html">Affichage Public</a>
                <a href="admin.html" class="admin-badge">Admin</a>
            </nav>
        </header>

        <div class="hero">
            <h1>File d'attente</h1>
            <p class="subtitle">Consultez l'état d'avancement des tickets</p>
        </div>

        <div class="table-container">
            <table class="queue-table">
                <thead>
                    <tr>
                        <th>Numéro</th>
                        <th>Service</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="number">A23</td>
                        <td class="service">Dépôt</td>
                        <td><span class="badge badge-cours">En cours</span></td>
                    </tr>
                    <tr>
                        <td class="number">A24</td>
                        <td class="service">Retrait</td>
                        <td><span class="badge badge-attente">En attente</span></td>
                    </tr>
                    <tr>
                        <td class="number">A22</td>
                        <td class="service">Dépôt</td>
                        <td><span class="badge badge-termine">Terminé</span></td>
                    </tr>
                    <tr>
                        <td class="number">A25</td>
                        <td class="service">Consultation</td>
                        <td><span class="badge badge-attente">En attente</span></td>
                    </tr>
                    <tr>
                        <td class="number">A26</td>
                        <td class="service">Retrait</td>
                        <td><span class="badge badge-attente">En attente</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="wait-time-box">
            Temps d'attente estimé : <strong>12 minutes</strong>
        </div>

        <div class="action-container">
            <button class="refresh-btn">Actualiser la page</button>
        </div>
    </div>

</body>
</html>
