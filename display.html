<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexto - Affichage</title>
<link rel="stylesheet" href="display.css">
</head>

<body>

<header class="header">
    <div class="logo">
        <span>Nexto</span>
    </div>
    <h1>Affichage des tickets</h1>
</header>

<main class="container">

<div class="layout">

    <!-- LEFT -->
    <section class="card-main">
        <p class="label">TICKET APPELÉ</p>
        <div class="number">B12</div>
        <div class="guichet">GUICHET 2</div>
    </section>

    <!-- RIGHT -->
    <aside class="sidebar">

        <div class="card">
            <h3>DERNIERS APPELÉS</h3>

            <div class="item"><span>B11</span><span>G2</span></div>
            <div class="item"><span>B10</span><span>G2</span></div>
            <div class="item"><span>B09</span><span>G2</span></div>
        </div>

        <div class="card message">
            Veuillez patienter après avoir pris votre ticket
        </div>

    </aside>

</div>

</main>

</body>
</html>
