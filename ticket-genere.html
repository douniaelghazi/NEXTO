<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexto - Ticket</title>
    <link rel="stylesheet" href="ticket-genere.css">
</head>
<body>

    <header class="navbar">
        <nav class="navbar">
  <h2 class="logo">Nexto</h2>
        </nav>
    </header>

    <main class="container">
        <div class="status-icon">✓</div>
        <h1>Ticket généré</h1>
        <p class="subtitle">Votre ticket a été créé avec succès</p>

        <div class="ticket-card">
            <div class="ticket-number">B12</div>
            <div class="divider"></div>
            
            <div class="ticket-details">
                <span class="label">SERVICE</span>
                <span class="value">État Civil</span>
            </div>

            <div class="ticket-details">
                <span class="label">HEURE DU TICKET</span>
                <span class="value">10:45</span>
            </div>

            <div class="waiting-box">
                <span>⌛</span> Veuillez attendre votre tour
            </div>
        </div>

        <a href="index.html" class="btn-home">Retour à l'accueil</a>
        
        <p class="footer-text">Vous serez notifié lorsque ce sera votre tour. Gardez votre numéro de ticket visible.</p>
    </main>

</body>
</html>
