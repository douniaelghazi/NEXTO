<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Votre ticket - Nexto">

    <title>Votre Ticket - Nexto</title>

    <link rel="icon" href="../favicon.svg" type="image/svg+xml">

    <link rel="stylesheet" href="style.css">

</head>

<body class="page-interne">

    <header>

        <div class="container">

            <div class="header-inner">

                <a href="index.html" class="logo">

                    <div class="logo-icon">∴</div>

                    <span>Nexto</span>

                </a>

            </div>

        </div>

    </header>
<main>
    <section>
        <div class="container-sm">
            <div class="ticket-wrapper">
                <div class="ticket-display">
                    <div class="ticket-header">
                        <div class="check-icon">✓</div>
                        <p class="status-text">Ticket généré</p>
                    </div>

                    <div class="ticket-body">
                        <p class="ticket-display-label">Votre numéro</p>
                        <div class="ticket-display-number">B12</div>

                        <div class="ticket-info">
                            <div class="info-row">
                                <span class="text-secondary">Service:</span>
                                <span class="font-bold">-</span>
                            </div>
                            <div class="info-row">
                                <span class="text-secondary">Heure:</span>
                                <span class="font-bold">10:45</span>
                            </div>
                        </div>

                        <p class="wait-message">⏳ Veuillez attendre votre tour</p>
                    </div>
                </div>

                <div class="ticket-actions">
    <a href="../index.html" class="btn btn-primary">Retour à l’accueil</a>
</div>
            </div>
        </div>
    </section>
</main>
</body>

</html>
